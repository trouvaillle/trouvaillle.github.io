<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="HandheldFriendly" content="true" />
    <title>{{ page.title | default: "App" }} | {{ site.name | default: "My" }} app</title>
    <link rel="stylesheet" type="text/css" href="styles.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=PT+Sans&display=swap" rel="stylesheet">
    <script type="text/javascript" src="script.js" defer></script>
</head>

<body>
    <div class="container">
        <div id="header">
            <span id="back"><a href="/"><i class="fa-solid fa-angle-left"></i></a></span>
            <span id="spanTitle">{{ page.title | default: "App" }}</span>
            <span id="sound"><i id="soundIcon" class="fa-solid fa-volume-xmark"></i></span>
        </div>
        <div id="levelBar">
            <select id="levelDropdown"><option>Loading...</option></select>
            <button id="undoBtn" disabled><i class="fa-solid fa-arrow-left"></i></button>
            <button id="redoBtn" disabled><i class="fa-solid fa-arrow-right"></i></button>
            <button id="resetBtn"><i class="fa-solid fa-rotate-left"></i> Reset</button>
        </div>
        <div class="content" id="content">
            <canvas id="gameCanvas"></canvas>
            <button id="showMovesBtn" style="display:none"><i class="fa-solid fa-play"></i> Show Moves</button>
        </div>
        <div id="dpad">
            <button id="dpadLeft" data-dir="LEFT"><i class="fa-solid fa-angle-left"></i></button>
            <button id="dpadUp" data-dir="UP"><i class="fa-solid fa-angle-up"></i></button>
            <button id="dpadRight" data-dir="RIGHT"><i class="fa-solid fa-angle-right"></i></button>
            <button id="dpadDown" data-dir="DOWN"><i class="fa-solid fa-angle-down"></i></button>
        </div>
    </div>
</body>

</html>
